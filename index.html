<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;}

body{
  background:#080808;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

/* HEADER */
header{
  height:100px;
  background:#050505;
  border-bottom:1px solid rgba(212,175,55,.2);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
}

.header-logo img{
  height:85px;
}

/* HERO */
.hero{
  min-height:calc(100vh - 100px);
  background:
    linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.8)),
    url('capa-mavien.jpg') center/cover;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  text-align:center;
  padding:60px 20px;
}

.hero-content img{
  width:240px;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  margin-bottom:20px;
}

.gold-btn{
  background:#d4af37;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
}

/* CATÁLOGO */
.section{
  padding:60px 6%;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.product{
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.product img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.product-info{
  padding:15px;
  text-align:center;
}

.price{
  color:#d4af37;
  font-size:20px;
  margin:10px 0;
}

/* PAGINAÇÃO */
.pagination{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:30px;
}

.pagination button{
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid #d4af37;
  background:#111;
  color:#d4af37;
}

.pagination button.active{
  background:#d4af37;
  color:#111;
}

/* MOBILE */
@media(max-width:600px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<header>
  <div class="header-logo">
    <img src="logo-mavien.png">
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <img src="logo-mavien.png">
    <p>Looks que valorizam você<br><strong>sem esforço</strong></p>
    <button class="gold-btn" onclick="document.getElementById('catalogo').scrollIntoView()">VER PEÇAS</button>
  </div>
</section>

<section class="section" id="catalogo">
  <div class="products" id="products"></div>
  <div class="pagination" id="pagination"></div>
</section>

<script>
const produtos = [
  {id:1,nome:"Vestido Preto",preco:89.90,imagem:"produto1.jpg"},
  {id:2,nome:"Cropped Branco",preco:49.90,imagem:"produto2.jpg"},
  {id:3,nome:"Saia Jeans",preco:79.90,imagem:"produto3.jpg"},
  {id:4,nome:"Conjunto Nude",preco:129.90,imagem:"produto4.jpg"},
  {id:5,nome:"Vestido Curto",preco:99.90,imagem:"produto5.jpg"},
  {id:6,nome:"Blusa Básica",preco:39.90,imagem:"produto6.jpg"},
  {id:7,nome:"Calça Wide",preco:119.90,imagem:"produto7.jpg"},
  {id:8,nome:"Short Jeans",preco:69.90,imagem:"produto8.jpg"},
  {id:9,nome:"Top Preto",preco:39.90,imagem:"produto9.jpg"},
  {id:10,nome:"Saia Curta",preco:59.90,imagem:"produto10.jpg"},
  {id:11,nome:"Vestido Festa",preco:149.90,imagem:"produto11.jpg"},
  {id:12,nome:"Cropped Rosa",preco:49.90,imagem:"produto12.jpg"},
  {id:13,nome:"Body Preto",preco:59.90,imagem:"produto13.jpg"},
  {id:14,nome:"Conjunto Preto",preco:139.90,imagem:"produto14.jpg"},
  {id:15,nome:"Vestido Branco",preco:129.90,imagem:"produto15.jpg"},
  {id:16,nome:"Saia Plissada",preco:89.90,imagem:"produto16.jpg"},
];

let paginaAtual = 1;
const itensPorPagina = 16;

function renderProducts(){
  const box = document.getElementById("products");
  box.innerHTML = "";

  const inicio = (paginaAtual - 1) * itensPorPagina;
  const fim = inicio + itensPorPagina;

  const paginaItens = produtos.slice(inicio, fim);

  paginaItens.forEach(p=>{
    box.innerHTML += `
      <div class="product">
        <img src="${p.imagem}">
        <div class="product-info">
          <h3>${p.nome}</h3>
          <div class="price">R$ ${p.preco}</div>
        </div>
      </div>
    `;
  });

  renderPagination();
}

function renderPagination(){
  const box = document.getElementById("pagination");
  box.innerHTML = "";

  const total = Math.ceil(produtos.length / itensPorPagina);

  for(let i=1;i<=total;i++){
    box.innerHTML += `
      <button class="${i===paginaAtual?'active':''}" onclick="changePage(${i})">${i}</button>
    `;
  }
}

function changePage(p){
  paginaAtual = p;
  renderProducts();
}

renderProducts();
</script>

</body>
</html>
