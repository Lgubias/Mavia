<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{background:#080808;color:#fff;font-family:Montserrat}
button{cursor:pointer}

/* HERO */
.hero{
  height:100vh;
  background:url('capa-mavien.jpg') center/cover;
  display:flex;align-items:center;justify-content:center;
}
.hero-content{text-align:center}

/* BAZAR */
.bazar-section{padding:60px;text-align:center;background:#050505}
.bazar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.bazar-card{background:#111;padding:10px;border-radius:10px}
.bazar-img img{width:100%;height:200px;object-fit:cover}

/* PRODUTOS */
.products{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:40px}
.product{background:#111;padding:10px;border-radius:10px}
.product img{width:100%;height:200px;object-fit:cover}

/* MODAL */
.product-modal{display:none;position:fixed;inset:0;background:#0009}
.product-modal.active{display:block}
.modal-content{background:#111;margin:50px auto;padding:20px;max-width:600px}

.badge{font-size:12px;padding:4px 8px;border-radius:20px}
.estoque{background:#25D366}
.encomenda{background:#d4af37;color:#111}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>MAVIEN</h1>
    <button onclick="scrollToBazar()">VER PEÇAS</button>
  </div>
</section>

<section class="bazar-section" id="bazar">
  <h2>Bazar MAVIEN</h2>
  <div class="bazar-grid" id="bazarGrid"></div>
</section>

<section>
  <h2 style="text-align:center;margin-top:40px">Catálogo</h2>
  <div class="products" id="products"></div>
</section>

<!-- MODAL -->
<div class="product-modal" id="productModal">
  <div class="modal-content">
    <button onclick="closeModal()">X</button>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <div id="modalPrice"></div>
    <div id="modalWarning"></div>
  </div>
</div>

<script>
const produtos = [
{id:1,nome:"Macacão Rosa",descricao:"Peça linda",preco:65,imagem:"neon1.jpeg",tipo:"estoque"},
{id:2,nome:"Macacão Preto",descricao:"Clássico",preco:60,imagem:"pt1.jpeg",tipo:"estoque"},
{id:3,nome:"Blazer",descricao:"Elegante",preco:35,imagem:"preto1.jpeg",tipo:"encomenda"}
]

function format(v){return v.toFixed(2).replace(".",",")}

function renderProducts(){
  const box=document.getElementById("products")

  box.innerHTML=produtos.map(p=>`
    <div class="product" onclick="openModal(${p.id})">
      <img src="${p.imagem}">
      <div class="badge ${p.tipo}">
        ${p.tipo==="estoque"?"Em estoque":"Sob encomenda"}
      </div>
      <h3>${p.nome}</h3>
      <p>${p.descricao}</p>
      <strong>R$ ${format(p.preco)}</strong>
    </div>
  `).join("")
}

function renderBazar(){
  const box=document.getElementById("bazarGrid")

  const bazar=[
    {nome:"Body",preco:20,imagem:"rosa1.jpeg"},
    {nome:"Short",preco:30,imagem:"preto1.jpeg"},
    {nome:"Saia",preco:25,imagem:"rosa2.jpeg"},
    {nome:"Blusa",preco:35,imagem:"rosa3.jpeg"}
  ]

  box.innerHTML=bazar.map(p=>`
    <div class="bazar-card">
      <div class="bazar-img">
        <img src="${p.imagem}">
      </div>
      <h3>${p.nome}</h3>
      <strong>R$ ${format(p.preco)}</strong>
    </div>
  `).join("")
}

function openModal(id){
  const p=produtos.find(x=>x.id===id)

  document.getElementById("modalTitle").innerText=p.nome
  document.getElementById("modalDesc").innerText=p.descricao
  document.getElementById("modalPrice").innerText="R$ "+format(p.preco)

  const aviso=document.getElementById("modalWarning")

  if(p.tipo==="encomenda"){
    aviso.innerHTML="Peça sob encomenda"
  }else{
    aviso.innerHTML=""
  }

  document.getElementById("productModal").classList.add("active")
}

function closeModal(){
  document.getElementById("productModal").classList.remove("active")
}

function scrollToBazar(){
  document.getElementById("bazar").scrollIntoView({behavior:"smooth"})
}

renderBazar()
renderProducts()
</script>

</body>
</html>
