<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN | Loja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html{
  scroll-behavior:smooth;
}

body{
  background:#080808;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

button{cursor:pointer;font-family:inherit}

header{
  height:110px;
  background:#050505;
  border-bottom:1px solid rgba(212,175,55,.22);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
}

.menu-btn,.cart-icon{
  background:none;
  border:none;
  color:#d4af37;
  font-size:34px;
}

.header-logo img{
  height:80px;
  object-fit:contain;
}

.side-menu{
  position:fixed;
  top:0;
  left:-330px;
  width:320px;
  height:100vh;
  background:#050505;
  border-right:1px solid rgba(212,175,55,.28);
  z-index:300;
  padding:28px 28px 40px;
  transition:.3s;
  overflow-y:auto;
}
