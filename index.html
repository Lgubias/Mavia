<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN | Loja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

header{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 7%;
  background:#080808;
  border-bottom:1px solid rgba(212,175,55,.25);
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo img{
  height:58px;
}

.logo span{
  font-family:'Playfair Display',serif;
  color:#d4af37;
  font-size:30px;
  letter-spacing:5px;
}

nav{
  display:flex;
  gap:22px;
  align-items:center;
}

nav a, nav button{
  color:#eee;
  background:none;
  border:none;
  font-size:14px;
  cursor:pointer;
}

.cart-btn{
  background:#d4af37!important;
  color:#111!important;
  padding:11px 18px;
  border-radius:30px;
  font-weight:600;
}

.hero{
  height:82vh;
  background:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.78)),
    url('capa-mavien.jpg') center 18%/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero-content img{
  width:150px;
  margin-bottom:20px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:62px;
  color:#d4af37;
  letter-spacing:8px;
}

.hero p{
  margin-top:12px;
  color:#ddd;
  font-size:18px;
}

.hero button{
  margin-top:28px;
  background:#d4af37;
  color:#111;
  border:none;
  padding:14px 28px;
  border-radius:40px;
  font-weight:600;
  cursor:pointer;
}

.section{
  padding:60px 7%;
}

.section-title{
  text-align:center;
  margin-bottom:28px;
}

.section-title h2{
  font-family:'Playfair Display',serif;
  color:#d4af37;
  font-size:42px;
  margin-bottom:10px;
}

.section-title p{
  color:#bdb7aa;
}

.categories{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:35px;
}

.categories button{
  border:none;
  padding:12px 22px;
  border-radius:30px;
  background:#1a1a1a;
  color:#ddd;
  cursor:pointer;
  border:1px solid rgba(212,175,55,.25);
}

.categories button.active{
  background:#d4af37;
  color:#111;
  font-weight:600;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}

.product{
  background:#111;
  border:1px solid rgba(212,175,55,.22);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(212,175,55,.08);
}

.product-img{
  height:360px;
  background:#181818;
}

.product-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
}

.product-info{
  padding:18px;
}

.product-info small{
  color:#d4af37;
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:1.5px;
}

.product-info h3{
  margin:8px 0;
  font-size:17px;
}

.product-info p{
  color:#bbb;
  font-size:13px;
  line-height:1.5;
  margin-bottom:12px;
}

.price{
  font-family:'Playfair Display',serif;
  color:#d4af37;
  font-size:23px;
  margin-bottom:14px;
}

.product-info button{
  width:100%;
  border:none;
  background:#d4af37;
  color:#111;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.final{
  display:grid;
  grid-template-columns:1fr 1fr;
  background:#111;
  border-top:1px solid rgba(212,175,55,.22);
}

.final-text{
  padding:70px 7%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.final-text h2{
  font-family:'Playfair Display',serif;
  color:#d4af37;
  font-size:42px;
  margin-bottom:18px;
}

.final-text p{
  color:#cfc7b8;
  line-height:1.8;
}

.final-img{
  min-height:620px;
  background:url('look2.jpg') center top/cover no-repeat;
}

.cart{
  position:fixed;
  top:0;
  right:-400px;
  width:370px;
  max-width:100%;
  height:100vh;
  background:#0d0d0d;
  border-left:1px solid rgba(212,175,55,.25);
  transition:.3s;
  z-index:50;
  padding:22px;
  overflow:auto;
}

.cart.active{right:0}

.cart h2{
  color:#d4af37;
  font-family:'Playfair Display',serif;
  margin-bottom:20px;
}

.close{
  float:right;
  background:none;
  color:white;
  border:none;
  font-size:26px;
  cursor:pointer;
}

.cart-item{
  border-bottom:1px solid rgba(212,175,55,.18);
  padding:14px 0;
}

.total{
  margin:22px 0;
  color:#d4af37;
  font-size:22px;
}

.checkout{
  width:100%;
  background:#25D366;
  color:white;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

@media(max-width:1000px){
  .products{grid-template-columns:repeat(2,1fr)}
  .final{grid-template-columns:1fr}
}

@media(max-width:600px){
  nav a{display:none}
  .products{grid-template-columns:1fr}
  .hero h1{font-size:42px}
  .product-img{height:420px}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo-mavien.png" alt="MAVIEN">
    <span>MAVIEN</span>
  </div>

  <nav>
    <a href="#catalogo">Catálogo</a>
    <a href="#sobre">Sobre</a>
    <button class="cart-btn" onclick="toggleCart()">Carrinho
