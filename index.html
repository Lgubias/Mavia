<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN | Loja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;}

body{
  background:#080808;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

button{
  cursor:pointer;
  font-family:inherit;
}

/* HEADER */
header{
  height:100px;
  background:#050505;
  border-bottom:1px solid rgba(212,175,55,.22);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
}

.menu-btn,.cart-icon{
  background:none;
  border:none;
  color:#d4af37;
  font-size:34px;
}

.header-logo img{
  height:85px;
  object-fit:contain;
}

/* MENU LATERAL */
.side-menu{
  position:fixed;
  top:0;
  left:-330px;
  width:320px;
  height:100vh;
  background:#050505;
  border-right:1px solid rgba(212,175,55,.28);
  z-index:500;
  padding:28px 28px 40px;
  transition:.3s;
  overflow-y:auto;
}

.side-menu.active{left:0}

.close-menu{
  background:none;
  border:none;
  color:white;
  font-size:34px;
  float:right;
}

.side-logo{
  clear:both;
  text-align:center;
  padding:65px 0 35px;
}

.side-logo img{
  width:150px;
}

.side-links{
  display:flex;
  flex-direction:column;
  gap:24px;
  margin-bottom:34px;
}

.side-links a,
.side-links button{
  color:#f4e8cf;
  background:none;
  border:none;
  text-align:left;
  font-size:20px;
  text-decoration:none;
}

.side-divider{
  height:1px;
  background:#d4af37;
  opacity:.75;
  margin:32px 0;
}

.side-title{
  color:#d4af37;
  font-size:14px;
  font-weight:700;
  letter-spacing:4px;
  margin-bottom:20px;
}

.category-list{
  display:flex;
  flex-direction:column;
}

.category-list button{
  width:100%;
  background:none;
  border:none;
  border-bottom:1px solid rgba(212,175,55,.16);
  color:#f4e8cf;
  font-size:19px;
  padding:15px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.category-list button span{
  color:#d4af37;
  font-size:24px;
}

/* HERO */
.hero{
  min-height:calc(100vh - 100px);
  background:
    linear-gradient(rgba(0,0,0,.20),rgba(0,0,0,.82)),
    url('capa-mavien.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  text-align:center;
  padding:60px 20px;
}

.hero-content img{
  width:240px;
  max-width:75%;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  margin-bottom:20px;
  color:#f1e6d3;
  line-height:1.4;
}

.hero p strong{
  color:#d4af37;
}

.gold-btn{
  background:#d4af37;
  color:#111;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
}

/* CATÁLOGO */
.section{
  padding:70px 6% 60px;
}

.section-title{
  text-align:center;
  margin-bottom:28px;
}

.section-title small{
  color:#d4af37;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
}

.section-title h2{
  font-family:'Playfair Display',serif;
  font-size:76px;
  font-weight:500;
  margin-top:8px;
  line-height:1;
}

.decor-line{
  width:330px;
  height:1px;
  background:linear-gradient(90deg, transparent, #d4af37, transparent);
  margin:28px auto 0;
  position:relative;
}

.decor-line::after{
  content:"◆";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-52%);
  color:#d4af37;
  background:#080808;
  padding:0 14px;
  font-size:13px;
}

/* ORDENAR / FILTRAR */
.catalog-controls{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin:26px auto 36px;
  width:100%;
}

.dropdown{
  position:relative;
  width:280px;
}

.dropdown.right{
  margin-left:auto;
  text-align:right;
}

.dropdown label{
  display:block;
  color:#f4e8cf;
  font-size:15px;
  margin-bottom:8px;
}

.dropdown.right label{
  text-align:right;
}

.dropdown-btn{
  width:100%;
  padding:13px 16px;
  background:#0d0d0d;
  color:#f4e8cf;
  border:1px solid rgba(212,175,55,.65);
  border-radius:12px;
  font-size:14px;
  text-align:left;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:58px;
  width:100%;
  background:rgba(15,15,15,.97);
  backdrop-filter:blur(6px);
  border:1px solid rgba(212,175,55,.45);
