<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIEN</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;}

body{
  background:#080808;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

button{
  cursor:pointer;
  font-family:inherit;
}

/* HEADER */
header{
  height:100px;
  background:#050505;
  border-bottom:1px solid rgba(212,175,55,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 6%;
}

.header-logo img{
  height:85px;
  object-fit:contain;
}

/* HERO */
.hero{
  min-height:calc(100vh - 100px);
  background:
    linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.8)),
    url('capa-mavien.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  text-align:center;
  padding:60px 20px;
}

.hero-content img{
  width:240px;
  max-width:75%;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  margin-bottom:20px;
  color:#f1e6d3;
  line-height:1.4;
}

.hero p strong{
  color:#d4af37;
}

.gold-btn{
  background:#d4af37;
  color:#111;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
}

/* CATÁLOGO */
.section{
  padding:60px 6%;
}

.section-title{
  text-align:center;
  margin-bottom:36px;
}

.section-title small{
  color:#d4af37;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
}

.section-title h2{
  font-family:'Playfair Display',serif;
  font-size:54px;
  font-weight:500;
  margin-top:8px;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.product{
  background:#111;
  border:1px solid rgba(212,175,55,.18);
  border-radius:14px;
  overflow:hidden;
  transition:.2s;
}

.product:hover{
  transform:translateY(-4px);
  border-color:rgba(212,175,55,.45);
}

.product img{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
}

.product-info{
  padding:15px;
  text-align:center;
}

.product-info h3{
  font-size:16px;
  margin-bottom:8px;
}

.price{
  color:#d4af37;
  font-family:'Playfair Display',serif;
  font-size:24px;
  margin:10px 0;
}

/* PAGINAÇÃO */
.pagination{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:34px;
}

.pagination button{
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid #d4af37;
  background:#111;
  color:#d4af37;
  font-weight:700;
}

.pagination button.active{
  background:#d4af37;
  color:#111;
}

/* MODAL PRODUTO */
.modal-produto{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.90);
  z-index:999;
  padding:20px;
  overflow:auto;
}

.modal-produto.active{
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.modal-box{
  background:#0d0d0d;
  border:1px solid rgba(212,175,55,.35);
  border-radius:18px;
  max-width:980px;
  width:100%;
  padding:22px;
  margin-top:30px;
  position:relative;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:26px;
}

.fechar-modal{
  position:absolute;
  top:12px;
  right:16px;
  background:none;
  border:none;
  color:#fff;
  font-size:34px;
  z-index:2;
}

.galeria-produto img{
  width:100%;
  border-radius:14px;
}

#imagemPrincipal{
  height:540px;
  object-fit:cover;
  object-position:center top;
  border:1px solid rgba(212,175,55,.25);
}

.miniaturas{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.miniaturas img{
  width:78px;
  height:92px;
  object-fit:cover;
  object-position:center top;
  border:1px solid rgba(212,175,55,.35);
  cursor:pointer;
  opacity:.75;
}

.miniaturas img:hover{
  opacity:1;
}

.detalhes-produto h2{
  font-family:'Playfair Display',serif;
  font-size:36px;
  color:#f4e8cf;
  margin-bottom:12px;
}

.modalPreco{
  color:#d4af37;
  font-family:'Playfair Display',serif;
  font-size:36px;
  margin-bottom:18px;
}

.detalhes-produto p{
  color:#ddd2bf;
  line-height:1.6;
  margin-bottom:18px;
}

.descricao-box{
  border:1px solid rgba(212,175,55,.25);
  border-radius:12px;
  padding:16px;
  margin-bottom:22px;
}

.descricao-box strong{
  display:block;
  color:#f4e8cf;
  margin-bottom:10px;
}

/* CARRINHO */
.cart{
  position:fixed;
  top:0;
  right:-400px;
  width:370px;
  max-width:100%;
  height:100vh;
  background:#0d0d0d;
  border-left:1px solid rgba(212,175,55,.25);
  transition:.3s;
  z-index:1000;
  padding:22px;
  overflow:auto;
}

.cart.active{
  right:0;
}

.close-cart{
  float:right;
  background:none;
  color:white;
  border:none;
  font-size:30px;
}

.cart h2{
  color:#d4af37;
  font-family:'Playfair Display',serif;
  margin-bottom:20px;
}

.cart-item{
  border-bottom:1px solid rgba(212,175,55,.18);
  padding:14px 0;
}

.cart-item button{
  margin-top:8px;
  background:#1c1c1c;
  color:#d4af37;
  border:1px solid rgba(212,175,55,.2);
  padding:8px 10px;
  border-radius:8px;
}

.total{
  margin:22px 0;
  color:#d4af37;
  font-size:22px;
}

.checkout{
  width:100%;
  background:#25D366;
  color:white;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:700;
}

/* MOBILE */
@media(max-width:900px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }

  .modal-box{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  header{
    height:86px;
  }

  .header-logo img{
    height:74px;
  }

  .hero{
    min-height:calc(100vh - 86px);
    padding:50px 20px;
  }

  .hero-content img{
    width:210px;
  }

  .section{
    padding:54px 5%;
  }

  .section-title h2{
    font-size:42px;
  }

  .products{
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  .product img{
    height:230px;
  }

  .product-info{
    padding:12px;
  }

  .product-info h3{
    font-size:13px;
  }

  .price{
    font-size:20px;
  }

  #imagemPrincipal{
    height:480px;
  }

  .detalhes-produto h2{
    font-size:30px;
  }

  .modalPreco{
    font-size:32px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-logo">
    <img src="logo-mavien.png" alt="MAVIEN">
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <img src="logo-mavien.png" alt="MAVIEN">
    <p>
      Looks que valorizam você<br>
      <strong>sem esforço</strong>
    </p>
    <button class="gold-btn" onclick="document.getElementById('catalogo').scrollIntoView()">
      VER PEÇAS
    </button>
  </div>
</section>

<section class="section" id="catalogo">
  <div class="section-title">
    <small>Catálogo</small>
    <h2>Nossas peças</h2>
  </div>

  <div class="products" id="products"></div>
  <div class="pagination" id="pagination"></div>
</section>

<div class="modal-produto" id="modalProduto">
  <div class="modal-box">
    <button class="fechar-modal" onclick="fecharProduto()">×</button>

    <div class="galeria-produto">
      <img id="imagemPrincipal" src="" alt="Produto">
      <div class="miniaturas" id="miniaturas"></div>
    </div>

    <div class="detalhes-produto">
      <h2 id="modalNome"></h2>
      <div class="modalPreco" id="modalPreco"></div>

      <p id="modalDescricao"></p>
      <p style="margin-top:10px; font-size:13px; color:#c9c2b3;">
  ✨ Produto sob encomenda. Para garantir a sua peça, consulte disponibilidade de cores e tamanhos via WhatsApp.
  Envio realizado após confirmação com o fornecedor.
</p>

      <div class="descricao-box">
        <strong>Descrição</strong>
        <p id="modalDetalhes"></p>
      </div>

      <button class="gold-btn" onclick="adicionarProdutoModal()">
        Adicionar ao carrinho 🛒
      </button>
    </div>
  </div>
</div>

<div class="cart" id="cart">
  <button class="close-cart" onclick="toggleCart()">×</button>
  <h2>Seu Carrinho</h2>
  <div id="cartItems"></div>
  <div class="total">Total: R$ <span id="total">0,00</span></div>
  <button class="checkout" onclick="checkout()">Comprar no WhatsApp</button>
</div>

<script>
const produtos = [
  {
    id:1,
    nome:"Jaqueta Fanny",
    preco:123.00,
    imagem:"Screenshot_20260425_192326_ZAX.jpg",
    imagens:[
      "Screenshot_20260425_192326_ZAX.jpg",
      "Screenshot_20260425_192416_ZAX.jpg",
      "Screenshot_20260425_192451_ZAX.jpg"
    ],
    descricao:"Jaqueta Fanny com brilho, zíper frontal, forro interno e modelagem moderna.",
    detalhes:"Tamanho único, veste aproximadamente 38/40. Possui zíper frontal, forro e acabamento com brilho. Peça estilosa para compor looks de balada, saída à noite ou produções mais chamativas."
  },
  {
    id:2,
    nome:"Cropped Branco",
    preco:49.90,
    imagem:"produto2.jpg",
    imagens:["produto2.jpg"],
    descricao:"Cropped branco básico e versátil.",
    detalhes:"Peça simples, fácil de combinar com saia, short, jeans ou calça."
  },
  {
    id:3,
    nome:"Saia Jeans",
    preco:79.90,
    imagem:"produto3.jpg",
    imagens:["produto3.jpg"],
    descricao:"Saia jeans casual e estilosa.",
    detalhes:"Ideal para looks casuais e produções para o dia a dia."
  },
  {
    id:4,
    nome:"Conjunto Nude",
    preco:129.90,
    imagem:"produto4.jpg",
    imagens:["produto4.jpg"],
    descricao:"Conjunto nude prático e bonito.",
    detalhes:"Look pronto para quem quer se vestir bem sem complicação."
  },
  {
    id:5,
    nome:"Vestido Curto",
    preco:99.90,
    imagem:"produto5.jpg",
    imagens:["produto5.jpg"],
    descricao:"Vestido curto para saída e balada.",
    detalhes:"Modelo feminino e fácil de usar em ocasiões especiais."
  },
  {
    id:6,
    nome:"Blusa Básica",
    preco:39.90,
    imagem:"produto6.jpg",
    imagens:["produto6.jpg"],
    descricao:"Blusa básica confortável.",
    detalhes:"Peça essencial para compor looks simples e bonitos."
  },
  {
    id:7,
    nome:"Calça Wide",
    preco:119.90,
    imagem:"produto7.jpg",
    imagens:["produto7.jpg"],
    descricao:"Calça wide moderna.",
    detalhes:"Boa opção para montar looks mais estilosos e confortáveis."
  },
  {
    id:8,
    nome:"Short Jeans",
    preco:69.90,
    imagem:"produto8.jpg",
    imagens:["produto8.jpg"],
    descricao:"Short jeans versátil.",
    detalhes:"Combina com cropped, blusa básica ou body."
  },
  {
    id:9,
    nome:"Top Preto",
    preco:39.90,
    imagem:"produto9.jpg",
    imagens:["produto9.jpg"],
    descricao:"Top preto básico.",
    detalhes:"Peça prática para looks de noite ou dia a dia."
  },
  {
    id:10,
    nome:"Saia Curta",
    preco:59.90,
    imagem:"produto10.jpg",
    imagens:["produto10.jpg"],
    descricao:"Saia curta feminina.",
    detalhes:"Ideal para compor looks mais jovens e estilosos."
  },
  {
    id:11,
    nome:"Vestido Festa",
    preco:149.90,
    imagem:"produto11.jpg",
    imagens:["produto11.jpg"],
    descricao:"Vestido para ocasiões especiais.",
    detalhes:"Modelo pensado para noite, festas e eventos."
  },
  {
    id:12,
    nome:"Cropped Rosa",
    preco:49.90,
    imagem:"produto12.jpg",
    imagens:["produto12.jpg"],
    descricao:"Cropped rosa delicado.",
    detalhes:"Combina com peças neutras, jeans e saia."
  },
  {
    id:13,
    nome:"Body Preto",
    preco:59.90,
    imagem:"produto13.jpg",
    imagens:["produto13.jpg"],
    descricao:"Body preto prático.",
    detalhes:"Peça coringa para montar looks para sair."
  },
  {
    id:14,
    nome:"Conjunto Preto",
    preco:139.90,
    imagem:"produto14.jpg",
    imagens:["produto14.jpg"],
    descricao:"Conjunto preto estiloso.",
    detalhes:"Look pronto com visual marcante."
  },
  {
    id:15,
    nome:"Vestido Branco",
    preco:129.90,
    imagem:"produto15.jpg",
    imagens:["produto15.jpg"],
    descricao:"Vestido branco feminino.",
    detalhes:"Modelo leve para ocasiões casuais ou especiais."
  },
  {
    id:16,
    nome:"Saia Plissada",
    preco:89.90,
    imagem:"produto16.jpg",
    imagens:["produto16.jpg"],
    descricao:"Saia plissada com caimento bonito.",
    detalhes:"Peça feminina e fácil de combinar."
  }
];

let paginaAtual = 1;
const itensPorPagina = 16;
let carrinho = [];
let produtoSelecionado = null;

function formatPrice(valor){
  return valor.toFixed(2).replace(".", ",");
}

function renderProducts(){
  const box = document.getElementById("products");
  box.innerHTML = "";

  const inicio = (paginaAtual - 1) * itensPorPagina;
  const fim = inicio + itensPorPagina;
  const paginaItens = produtos.slice(inicio, fim);

  paginaItens.forEach(p=>{
    box.innerHTML += `
      <div class="product" onclick="abrirProduto(${p.id})">
        <img src="${p.imagem}" alt="${p.nome}">
        <div class="product-info">
          <h3>${p.nome}</h3>
          <div class="price">R$ ${formatPrice(p.preco)}</div>
        </div>
      </div>
    `;
  });

  renderPagination();
}

function renderPagination(){
  const box = document.getElementById("pagination");
  box.innerHTML = "";

  const total = Math.ceil(produtos.length / itensPorPagina);

  for(let i=1;i<=total;i++){
    box.innerHTML += `
      <button class="${i===paginaAtual?'active':''}" onclick="changePage(${i})">${i}</button>
    `;
  }
}

function changePage(p){
  paginaAtual = p;
  renderProducts();
  document.getElementById("catalogo").scrollIntoView();
}

function abrirProduto(id){
  produtoSelecionado = produtos.find(p => p.id === id);

  document.getElementById("modalNome").innerText = produtoSelecionado.nome;
  document.getElementById("modalPreco").innerText = "R$ " + formatPrice(produtoSelecionado.preco);
  document.getElementById("modalDescricao").innerText = produtoSelecionado.descricao;
  document.getElementById("modalDetalhes").innerText = produtoSelecionado.detalhes;

  document.getElementById("imagemPrincipal").src = produtoSelecionado.imagens[0];

  const miniaturas = document.getElementById("miniaturas");
  miniaturas.innerHTML = "";

  produtoSelecionado.imagens.forEach(img=>{
    miniaturas.innerHTML += `
      <img src="${img}" onclick="trocarImagem('${img}')">
    `;
  });

  document.getElementById("modalProduto").classList.add("active");
}

function trocarImagem(img){
  document.getElementById("imagemPrincipal").src = img;
}

function fecharProduto(){
  document.getElementById("modalProduto").classList.remove("active");
}

function adicionarProdutoModal(){
  if(!produtoSelecionado) return;
  carrinho.push(produtoSelecionado);
  renderCart();
  fecharProduto();
  toggleCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function renderCart(){
  const box = document.getElementById("cartItems");
  const total = document.getElementById("total");

  box.innerHTML = "";
  let soma = 0;

  if(carrinho.length === 0){
    box.innerHTML = "<p>Seu carrinho está vazio.</p>";
    total.innerText = "0,00";
    return;
  }

  carrinho.forEach((p,i)=>{
    soma += p.preco;
    box.innerHTML += `
      <div class="cart-item">
        <strong>${p.nome}</strong><br>
        R$ ${formatPrice(p.preco)}<br>
        <button onclick="removeItem(${i})">Remover</button>
      </div>
    `;
  });

  total.innerText = formatPrice(soma);
}

function removeItem(i){
  carrinho.splice(i,1);
  renderCart();
}

function checkout(){
  if(carrinho.length === 0){
    alert("Seu carrinho está vazio.");
    return;
  }

  let msg = "Olá, quero comprar na MAVIEN:%0A";
  let soma = 0;

  carrinho.forEach(p=>{
    soma += p.preco;
    msg += `- ${p.nome} | R$ ${formatPrice(p.preco)}%0A`;
  });

  msg += `%0ATotal: R$ ${formatPrice(soma)}`;

  window.open("https://wa.me/5500000000000?text=" + msg);
}

renderProducts();
renderCart();
</script>

</body>
</html>
